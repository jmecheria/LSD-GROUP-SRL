<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transport Persoane</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}
.hidden{display:none}
.nav{position:fixed;top:40px;width:100%;background:#111;padding:10px;display:flex;justify-content:space-between;z-index:10}
.ticker{position:fixed;top:0;width:100%;background:#1e293b;padding:5px;overflow:hidden;white-space:nowrap}
.container{padding:100px 20px}
.card{background:#1e293b;padding:15px;margin:10px;border-radius:10px}
.btn{padding:8px 12px;border:none;border-radius:6px;cursor:pointer}
.primary{background:#3b82f6;color:#fff}
.danger{background:#ef4444;color:#fff}
.ghost{background:#334155;color:#fff}
.badge{background:#22c55e;padding:3px 6px;border-radius:5px}
</style>
</head>

<body>

<div class="ticker" id="ticker">Se încarcă...</div>

<div class="nav">
  <div>
    <button onclick="nav('home')">Home</button>
    <button onclick="nav('flota')">Flotă</button>
    <button onclick="nav('rezervari')">Rezervări</button>
    <button id="adminBtn" class="hidden" onclick="nav('admin')">Admin</button>
  </div>
  <div>
    <button id="loginBtn">Login</button>
    <button id="logoutBtn" class="hidden">Logout</button>
  </div>
</div>

<div class="container">

<div id="home">
  <h1>Transport Persoane</h1>
  <p>Curse moderne și rapide</p>
  <div id="nextCurse"></div>
</div>

<div id="flota" class="hidden"></div>

<div id="rezervari" class="hidden">
  <h2>Rezervare</h2>

  <input id="plecare" placeholder="Plecare">
  <input id="dest" placeholder="Destinație">
  <input id="data" type="date">
  <input id="pers" type="number" placeholder="Persoane">

  <button class="btn primary" onclick="calc()">Caută</button>

  <div id="recomandari"></div>
</div>

<div id="admin" class="hidden">
  <h2>Admin</h2>

  <button onclick="loadDemo()">Încarcă demo</button>

  <h3>Reguli Firestore</h3>
  <textarea style="width:100%;height:200px">
rules_version = '2';
service cloud.firestore {
 match /databases/{database}/documents {

  function isAdmin() {
    return request.auth.token.email == "irimia.teodor.17@gmail.com";
  }

  match /flota/{id} {
    allow read: if true;
    allow write: if isAdmin();
  }

  match /rezervari/{id} {
    allow create: if request.auth != null;
    allow read: if isAdmin() || request.auth.uid == resource.data.uid;
    allow write: if isAdmin();
  }

  match /status/{id} {
    allow read: if true;
    allow write: if isAdmin();
  }

 }
}
  </textarea>
</div>

</div>

<!-- LOGIN -->
<div id="loginModal" class="hidden">
  <div class="card">
    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Parola">
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDx...",
  authDomain: "lsd-group-srl.firebaseapp.com",
  projectId: "lsd-group-srl"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let state={user:null,flota:[],rezervari:[],status:[]};

function nav(x){
  document.querySelectorAll('.container > div').forEach(d=>d.classList.add('hidden'));
  document.getElementById(x).classList.remove('hidden');
}

auth.onAuthStateChanged(u=>{
  state.user=u;
  loginBtn.classList.toggle('hidden',!!u);
  logoutBtn.classList.toggle('hidden',!u);

  if(u && u.email==="irimia.teodor.17@gmail.com"){
    adminBtn.classList.remove('hidden');
  } else {
    adminBtn.classList.add('hidden');
  }
});

loginBtn.onclick=()=>loginModal.classList.remove('hidden');
logoutBtn.onclick=()=>auth.signOut();

function login(){
  auth.signInWithEmailAndPassword(email.value,pass.value);
}
function register(){
  auth.createUserWithEmailAndPassword(email.value,pass.value);
}

// 🔥 LOAD DATA
db.collection("flota").onSnapshot(s=>{
  state.flota=s.docs.map(d=>({id:d.id,...d.data()}));
  renderFlota();
});

db.collection("status").onSnapshot(s=>{
  state.status=s.docs.map(d=>d.data());
  ticker.innerText=state.status.map(x=>x.mesaj).join(" | ");
});

function renderFlota(){
  flota.innerHTML=state.flota.map(v=>`
    <div class="card">
      <h3>${v.nume}</h3>
      <p>${v.capacitate} locuri</p>
      <p>${v.pretPerKm} lei/km</p>
    </div>
  `).join('');
}

// 🧠 DISTANȚĂ SIMULATĂ
function distance(a,b){
  return Math.floor(Math.random()*300+50);
}

// 🧠 RECOMANDARE
function calc(){
  const persoane=parseInt(pers.value);
  const d=distance();

  let libere=state.flota;

  let recomandari=libere.filter(v=>v.capacitate>=persoane);

  recomandariDiv.innerHTML=recomandari.map(v=>`
    <div class="card">
      <h3>${v.nume}</h3>
      <p>Preț estimat: ${v.pretPerKm*d} lei</p>
      <button onclick="rezerva('${v.id}',${v.pretPerKm*d})">Rezervă</button>
    </div>
  `).join('');
}

// 📅 REZERVARE
function rezerva(id,pret){
  if(!state.user){alert("Login necesar");return;}

  db.collection("rezervari").add({
    uid:state.user.uid,
    plecare:plecare.value,
    destinatie:dest.value,
    data:data.value,
    persoane:parseInt(pers.value),
    vehiculeSelectate:[id],
    pretEstimativ:pret,
    status:"nou",
    createdAt:new Date().toISOString()
  });

  sendEmail();
}

// 📧 EMAIL (EmailJS)
function sendEmail(){
  console.log("Email trimis (simulare)");
}

// 🧪 DEMO
async function loadDemo(){
  await db.collection("flota").add({
    nume:"Mercedes Intouro",
    capacitate:50,
    pretPerKm:5
  });

  await db.collection("status").add({
    mesaj:"Iași → București în cursă"
  });
}

</script>

</body>
</html>
