<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transport Persoane</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f5f7fa;}
.navbar { position:fixed; top:40px; width:100%; background:#111; color:white; display:flex; justify-content:space-around; padding:10px; z-index:1000;}
.navbar a { color:white; cursor:pointer;}
.ticker { position:fixed; top:0; width:100%; background:#ff9800; color:white; padding:10px; overflow:hidden; white-space:nowrap;}
.ticker span { display:inline-block; padding-left:100%; animation:scroll 15s linear infinite;}
@keyframes scroll { from{transform:translateX(0);} to{transform:translateX(-100%);} }

.section { padding:120px 20px;}
.card { background:white; padding:15px; margin:10px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.btn { background:#007bff; color:white; padding:10px; border:none; cursor:pointer; margin-top:5px;}
.badge { padding:5px 10px; border-radius:5px; color:white;}
.ok { background:green;}
.no { background:red;}
.rec { background:orange;}
.hidden { display:none;}
</style>
</head>

<body>

<div class="ticker"><span id="tickerText">Se încarcă...</span></div>

<div class="navbar">
<a onclick="showPage('home')">Home</a>
<a onclick="showPage('flota')">Flotă</a>
<a onclick="showPage('rezervari')">Rezervări</a>
<a onclick="logout()">Logout</a>
<a id="adminBtn" onclick="showPage('admin')" class="hidden">Admin</a>
</div>

<div id="home" class="section">
<h1>Transport Persoane</h1>
<h3 id="nextTrip"></h3>
<button class="btn" onclick="showPage('rezervari')">Rezervă rapid</button>
<div id="previewFlota"></div>
</div>

<div id="flota" class="section hidden">
<h2>Flotă</h2>
<div id="flotaList"></div>
</div>

<div id="rezervari" class="section hidden">
<h2>Rezervare</h2>
<input id="plecare" placeholder="Plecare"><br>
<input id="destinatie" placeholder="Destinație"><br>
<input type="date" id="data"><br>
<input id="persoane" type="number" placeholder="Persoane"><br>
<button class="btn" onclick="genereaza()">Caută</button>
<div id="recomandari"></div>
</div>

<div id="admin" class="section hidden">
<h2>Admin Panel</h2>

<h3>Adaugă autobuz</h3>
<input id="nume" placeholder="Nume"><br>
<input id="cap" placeholder="Capacitate"><br>
<input id="pret" placeholder="Preț/km"><br>
<input id="dotari" placeholder="Dotări"><br>
<button class="btn" onclick="addBus()">Adaugă</button>

<h3>Adaugă status</h3>
<input id="msg" placeholder="Mesaj"><br>
<button class="btn" onclick="addStatus()">Adaugă</button>

<div id="adminRez"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDx9ulvKXa0Rnnnr1T_1jFsUmOAHQ0011c",
  authDomain: "lsd-group-srl.firebaseapp.com",
  projectId: "lsd-group-srl"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let user=null;

auth.onAuthStateChanged(u=>{
user=u;
if(u && u.email==="irimia.teodor.17@gmail.com"){
document.getElementById("adminBtn").classList.remove("hidden");
}
loadAll();
});

function showPage(p){
document.querySelectorAll('.section').forEach(s=>s.classList.add('hidden'));
document.getElementById(p).classList.remove('hidden');
}

function logout(){ auth.signOut(); }

async function loadAll(){
loadFlota();
loadTicker();
loadNext();
loadAdminRez();
}

async function loadTicker(){
let snap=await db.collection("status").get();
let txt="";
snap.forEach(d=>{ if(d.data().activ) txt+=d.data().mesaj+" 🔴 ";});
document.getElementById("tickerText").innerText=txt||"Niciun autobuz activ";
}

async function loadNext(){
let snap=await db.collection("curse").limit(1).get();
snap.forEach(d=>{
document.getElementById("nextTrip").innerText="Următoarea cursă: "+d.data().mesaj;
});
}

async function loadFlota(){
let snap=await db.collection("flota").get();
let html="";
snap.forEach(doc=>{
let b=doc.data();
html+=`
<div class="card">
<h3>${b.nume}</h3>
<p>Capacitate: ${b.capacitate}</p>
<p>${b.dotari}</p>
<p>${b.pretPerKm} lei/km</p>
<input type="date" onchange="check('${doc.id}',this.value,this)">
<div></div>
</div>`;
});
document.getElementById("flotaList").innerHTML=html;
document.getElementById("previewFlota").innerHTML=html;
}

async function check(id,data,input){
let res=await db.collection("rezervari")
.where("data","==",data).get();

let ocupat=false;
res.forEach(r=>{
if(r.data().vehiculeSelectate.includes(id)) ocupat=true;
});

let el=input.nextElementSibling;
if(ocupat){
el.innerHTML='<span class="badge no">Indisponibil</span>';
}else{
el.innerHTML='<span class="badge ok">Disponibil</span>';
}
}

async function genereaza(){
let persoane=parseInt(document.getElementById("persoane").value);
let data=document.getElementById("data").value;

let flota=await db.collection("flota").get();
let rez=await db.collection("rezervari").where("data","==",data).get();

let ocupate=[];
rez.forEach(r=>ocupate.push(...r.data().vehiculeSelectate));

let libere=[];
flota.forEach(doc=>{
if(!ocupate.includes(doc.id)) libere.push({...doc.data(), id:doc.id});
});

let recomandari=[];

libere.forEach(b=>{
if(b.capacitate>=persoane){
recomandari.push({tip:"1",bus:[b],cap:b.capacitate,pret:b.pretPerKm*100});
}
});

for(let i=0;i<libere.length;i++){
for(let j=i+1;j<libere.length;j++){
let cap=libere[i].capacitate+libere[j].capacitate;
if(cap>=persoane){
recomandari.push({
tip:"2",
bus:[libere[i],libere[j]],
cap,
pret:(libere[i].pretPerKm+libere[j].pretPerKm)*100
});
}
}
}

recomandari.sort((a,b)=>a.pret-b.pret);

let html="";
recomandari.forEach((r,i)=>{
html+=`
<div class="card">
<h3>${r.bus.map(b=>b.nume).join(" + ")}</h3>
<p>Capacitate: ${r.cap}</p>
<p>Preț: ${r.pret} lei</p>
${i===0?'<span class="badge rec">Recomandat</span>':''}
<button class="btn" onclick='rezerva(${JSON.stringify(r)})'>Alege</button>
</div>`;
});

document.getElementById("recomandari").innerHTML=html;
}

async function rezerva(r){
if(!user) return alert("Login necesar");

await db.collection("rezervari").add({
uid:user.uid,
data:document.getElementById("data").value,
vehiculeSelectate:r.bus.map(b=>b.id),
persoane:parseInt(document.getElementById("persoane").value),
pretEstimativ:r.pret,
status:"nou",
createdAt:new Date()
});

alert("Rezervare trimisă!");
}

async function addBus(){
await db.collection("flota").add({
nume:nume.value,
capacitate:parseInt(cap.value),
pretPerKm:parseFloat(pret.value),
dotari:dotari.value
});
loadFlota();
}

async function addStatus(){
await db.collection("status").add({
mesaj:msg.value,
activ:true
});
loadTicker();
}

async function loadAdminRez(){
let snap=await db.collection("rezervari").get();
let html="";
snap.forEach(doc=>{
let r=doc.data();
html+=`
<div class="card">
<p>${r.data} | ${r.persoane} pers</p>
<button onclick="confirmRez('${doc.id}')">Confirmă</button>
<button onclick="delRez('${doc.id}')">Șterge</button>
</div>`;
});
document.getElementById("adminRez").innerHTML=html;
}

async function confirmRez(id){
await db.collection("rezervari").doc(id).update({status:"confirmat"});
loadAdminRez();
}

async function delRez(id){
await db.collection("rezervari").doc(id).delete();
loadAdminRez();
}
</script>

</body>
</html>
